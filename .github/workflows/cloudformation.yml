# This is a basic workflow to help you get started with Actions
#updated access permissions, will have to work on tightening it later, for now there is larger access
name: CloudFormation Push Check  

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]


# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  deploy:
    runs-on: ubuntu-latest #considering OS of AWS

    steps:
      - name: RunCheckout 
        uses: actions/checkout@v4
        #credentials for AWS put in here
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v6.0.0
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_SECRET_REGION }}
      # - name: Deploy CloudFormation stack
      #   run: |
      #     aws cloudformation deploy \
      #       --template-file infrastructure/template.yaml \
      #       --stack-name my-demo-stack 
      - name: Deploy to AWS CloudFormation
        uses: aws-actions/aws-cloudformation-github-deploy@v2.0.0
        with:
          name: learnGlueCloudCICD
          template: Templates/LambdaCreation.yaml
