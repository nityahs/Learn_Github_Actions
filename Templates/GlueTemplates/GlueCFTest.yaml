#Work for environment setup and glue sync
#Working well
AWSTemplateFormatVersion: '2010-09-09'
Description: Cloud Formation template made by the means of github actions
Resources:
  MyJobRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - glue.amazonaws.com
            Action:
              - sts:AssumeRole
      ManagedPolicyArns:
      - arn:aws:iam::aws:policy/service-role/AWSGlueServiceRole
      Path: /
      Policies:
        - PolicyName: root
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: s3:*
                Resource: '*'
  MytestGlueFunc:
    Type: AWS::Glue::Job
    Properties:
      Command:
        Name: glueetl
        PythonVersion: "3.9"
        ScriptLocation: "s3://cloudformation-template-nitya/LambdaPythonScripts/GlueTest.py"
      WorkerType: G.1X 
      NumberOfWorkers: 2
      Timeout: 10
      ExecutionProperty:
        MaxConcurrentRuns: 10 
      MaxRetries: 1
      GlueVersion: "4.0"
      Name: nitya-gluetest
      Role: !Ref MyJobRole



